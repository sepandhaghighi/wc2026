name: Validate Predictions

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate prediction JSON files
        run: python validate_predictions.py